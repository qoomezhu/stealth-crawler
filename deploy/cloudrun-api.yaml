apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stealth-crawler
spec:
  template:
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/stealth-crawler:latest
          ports:
            - containerPort: 8080
          env:
            - name: CRAWLER_API_KEY
              value: CHANGE_ME
            - name: CRAWLER_RATE_LIMIT_REQUESTS
              value: "60"
            - name: CRAWLER_RATE_LIMIT_WINDOW
              value: "60"
            - name: CRAWLER_RATE_LIMIT_BACKEND
              value: memory
            - name: MCP_BEARER_TOKEN
              value: CHANGE_ME_MCP_TOKEN
            - name: MCP_PUBLIC_PATHS
              value: /mcp/healthz
